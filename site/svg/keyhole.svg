<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
	<!-- The Solid UI Layer (Wall) -->
	<rect x="0" y="0" width="200" height="120" fill="#181818" />
	<rect x="5" y="5" width="190" height="110" fill="none" stroke="#2A2A2A" stroke-width="2" />

	<!-- Abstract UI Elements on the surface -->
	<rect x="20" y="20" width="40" height="10" fill="#2A2A2A" />
	<rect x="20" y="40" width="60" height="5" fill="#2A2A2A" />
	<rect x="20" y="50" width="50" height="5" fill="#2A2A2A" />
	<circle cx="160" cy="25" r="8" fill="#2A2A2A" />

	<!-- The Keyhole Cutout -->
	<g transform="translate(100, 55)">
		<circle cx="0" cy="-10" r="25" fill="#F4F0EA" />
		<path d="M -15,-5 L -25,35 L 25,35 L 15,-5 Z" fill="#F4F0EA" />

		<!-- The Agent's Eye peering through -->
		<path d="M -18,-8 Q 0,-25 18,-8 Q 0,10 -18,-8 Z" fill="none" stroke="#E53935" stroke-width="3" />
		<circle cx="0" cy="-8" r="6" fill="#E53935" />
		<circle cx="0" cy="-8" r="2" fill="#F4F0EA" />
	</g>

	<!-- Data trying to escape -->
	<path d="M 100,95 L 100,115" stroke="#E53935" stroke-width="2" stroke-dasharray="4 4" />
</svg>
